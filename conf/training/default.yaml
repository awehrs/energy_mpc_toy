# Basic Training Parameters
name: default
seed: 42
num_epochs: 1
max_steps: -1  
per_device_train_batch_size: 32
per_device_eval_batch_size: 64
gradient_accumulation_steps: 8
train_ratio: .9
show_stats: true
max_tokens_per_batch: 32000
even_batches: false 
action_bucket: "data"
dataset_name: "action_dataset"
cache_dir: "/tmp/datasets"

# Learning Rate & Optimization
learning_rate: 3e-4
lr_scheduler_type: "cosine"  # "linear", "cosine", "constant"
warmup_steps: 100
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1e-8
weight_decay: 0.0
max_grad_norm: 10.0

# Mixed Precision & Compilation
mixed_precision: "bf16"  # "none", "fp16", "bf16"
dtype: bf16
half_precision_backend: auto
torch_compile: true
torch_compile_mode: null
gradient_checkpointing: false

# Logging & Evaluation
logging_strategy: steps
logging_steps: 10
logging_nan_inf_filter: false
eval_strategy: "no"
eval_steps: 500
eval_accumulation_steps: null
save_strategy: steps
save_steps: 2000
save_total_limit: 3

# Output & Checkpointing
output_dir: "data/out"
resume_from_checkpoint: false

# Wandb Configuration
log_wandb: true
wandb_project: "training"
wandb_entity: awehrs
wandb_run: null
wandb_run_name: null


# ================================
# Action VAE Specific Parameters
# ================================

free_bits: 1.0
kl_warmup_delay: 500
kl_anneal_steps: 5000

# Corruption Scheduler
corruption_start_rate: 1.0
corruption_end_rate: 1.0
corruption_warmup_steps: 1000
corruption_mean_span_length: 10
corruption_full_mask_prob: 0.15


# ================================
# JEPA Specific Parameters
# ================================
ema_decay: 0.999

# ================================
# Actuator Training Parameters
# ================================
jepa_checkpoint: null  # Path to JEPA checkpoint dir

# ================================
# Alternating Trainer Parameters
# ================================
n_cycles: 5              # (energy + policy) cycles after completion phase
completion_epochs: 1     # BCE passes over terminal states before alternating loop
completion_batch_size: 256
energy_batch_size: 512
policy_batch_size: 64
policy_steps_per_epoch: -1  # -1 = len(state_cache) // policy_batch_size
n_terminal_steps: 2      # final N steps of each trajectory counted as terminal
n_policy_samples: 4      # K policy rollout branches per energy target (0 = dataset only)
max_policy_weight: 0.5   # policy mixture weight at end of training (linearly ramped)

# ================================
# Energy MPC Specific Parameters
# ================================

# Sequence Plot Logging
plot_logging_frequency: 100  # Plot CE vs Energy less frequently

# Loss Component Weights
w_decode: 1.0      # Decoding loss weight
w_energy: 1.0      # Energy supervision weight
w_mono: 0.2        # Monotonicity penalty weight
w_forward: 0.1     # Forward prediction loss weight
mono_margin: 0.0   # Monotonicity margin


# ================================
# Dataloader & System Settings
# ================================

# Dataloader
dataloader_num_workers: 4
dataloader_pin_memory: true
dataloader_drop_last: true

# System Settings
log_dir: base
verbose: false
backend: nccl
device: cuda
jit_mode_eval: false
quantization: null
fuse_gelu: null
deepspeed: null
init_retriever: true
disable_tqdm: false
print_dataset_stats: true
torch_empty_cache_steps: 100
prediction_loss_only: true
