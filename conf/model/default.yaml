# Shared model params
n_cross_attn_heads: ${n_cross_attn_heads}
n_self_attn_heads: ${n_self_attn_heads}
dropout: ${dropout}


# Action autoencoder
action_model:
  d_latent: ${d_latent}
  d_model: 768
  max_action_len: ${max_action_len}
  n_action_latents: ${n_action_latents}
  n_encoder_self_attn_layers: 8
  n_decoder_self_attn_layers: 8
  n_cross_attn_heads: ${n_cross_attn_heads}
  n_self_attn_heads: ${n_self_attn_heads}
  dropout: ${dropout}
  model_name: ${pretrained_lm}

# JEPA agent — shared across components
d_model: ${d_latent}
n_heads: 8
n_precept_latents: 64
n_action_latents: ${n_action_latents}
norm_eps: 1e-5

sensor:
  model_name: ${pretrained_lm}

memory:
  n_blocks: 4
  n_mixer_layers: 2

predictor:
  n_layers: 4

energy:
  continue_constant: 1.0   # step cost in soft Bellman targets (higher → prefer stopping sooner)
completion: {}  # same

policy:
  n_layers: 4
  time_emb_dim: 1024
  n_integration_steps: 10

plan:
  horizon: 3
  num_samples: 16

